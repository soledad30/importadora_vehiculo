services:
  postgres:
    image: postgres:17
    container_name: importadora-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: importadora_vehiculos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d importadora_vehiculos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
