# API Gateway único — Importadora Vehículos 2026
# Expone un solo puerto (8888 en el host) y enruta a MS-1, MS-2, MS-3 y Angular.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    access_log /var/log/nginx/access.log;

    # Microservicios en el host (Docker Desktop: host.docker.internal)
    upstream ms1 {
        server host.docker.internal:8080;
    }
    upstream ms2 {
        server host.docker.internal:8081;
    }
    upstream ms3 {
        server host.docker.internal:8082;
    }
    upstream angular {
        server host.docker.internal:4200;
    }

    server {
        listen 80;
        server_name localhost;

        client_max_body_size 50M;

        # Health del gateway
        location = /gateway/health {
            default_type application/json;
            return 200 '{"status":"UP","service":"importadora-gateway","routes":["/api","/ms2","/ms3","/"]}';
        }

        # ── MS-1 Principal (Spring Boot) ─────────────────────────────
        location /api/ {
            proxy_pass http://ms1;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;
        }

        location /swagger-ui/ {
            proxy_pass http://ms1;
            proxy_set_header Host $host;
        }

        location /api-docs {
            proxy_pass http://ms1;
            proxy_set_header Host $host;
        }

        location /actuator/ {
            proxy_pass http://ms1;
            proxy_set_header Host $host;
        }

        # ── MS-2 ML (Django) — /ms2/api/* → :8081/api/* ─────────────
        location /ms2/ {
            rewrite ^/ms2/(.*)$ /$1 break;
            proxy_pass http://ms2;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;
        }

        # ── MS-3 DL (FastAPI) — /ms3/api/* → :8082/api/* ────────────
        location /ms3/ {
            rewrite ^/ms3/(.*)$ /$1 break;
            proxy_pass http://ms3;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
            proxy_connect_timeout 10s;
            proxy_read_timeout 180s;
        }

        # ── Angular dev server (SPA + HMR WebSocket) ─────────────────
        location / {
            proxy_pass http://angular;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400;
        }
    }
}
